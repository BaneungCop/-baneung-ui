name: Release

# master에 푸시될 때 동작.
# - 미반영된 changeset이 있으면: "Version Packages" PR을 자동 생성/갱신.
# - "Version Packages" PR이 머지되어 changeset이 모두 소진된 상태로 푸시되면: npm publish 실행.
on:
  push:
    branches:
      - master

# 동시에 여러 release job이 돌지 않도록 직렬화.
concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # release commit, tag 생성용
      pull-requests: write # Version PR 생성/갱신용
      id-token: write # npm provenance(추후 옵션) 대비
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # changesets가 git history를 봐야 하므로 전체 fetch.
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        # changesets/action의 publish 단계에서도 build를 돌리지만,
        # version PR 단계에서 미리 빌드 가능 여부를 검증해 둔다.
        run: pnpm build

      # ~/.npmrc에 토큰을 literal로 직접 write.
      # actions/setup-node의 ${NODE_AUTH_TOKEN} env 치환이 changesets/cli가
      # spawn한 npm 프로세스에 도달하지 않아 ENEEDAUTH로 실패하는 문제를 우회.
      # GitHub Actions가 로그에서 secret 값을 자동 마스킹하므로 노출 위험 없음.
      - name: Configure npm authentication
        run: |
          echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" > ~/.npmrc
          echo "registry=https://registry.npmjs.org/" >> ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # 디버그: 토큰이 정상 도달했는지 + npm이 어느 사용자로 인식하는지 확인.
      # 토큰 값 자체는 노출하지 않고 길이/prefix/suffix만 출력.
      - name: Debug npm authentication
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::NPM_TOKEN env is empty"
            exit 1
          fi
          echo "NPM_TOKEN length: ${#NPM_TOKEN}"
          echo "NPM_TOKEN prefix: ${NPM_TOKEN:0:6}"
          echo "NPM_TOKEN suffix: ${NPM_TOKEN: -4}"
          echo ""
          echo "~/.npmrc contents (token redacted):"
          sed 's/_authToken=.*/_authToken=<REDACTED>/' ~/.npmrc
          echo ""
          echo "npm whoami:"
          npm whoami || echo "whoami failed"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Release Pull Request or Publish
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm version-packages
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
